<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event | Automotive Photography</title>
  <link rel="icon" type="image/png" href="photos/favicon.png">
  <link rel="apple-touch-icon" href="photos/favicon.png">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────── -->
  <nav class="site-nav" id="site-nav">
    <a href="index.html" class="nav-logo">N.V MEDIA</a>
    <ul class="nav-links">
      <li><a href="portfolio.html">Photography</a></li>
      <li><a href="contacts.html">Contacts</a></li>
    </ul>
  </nav>

  <!-- ── EVENT HERO HEADER ────────────────────────────── -->
  <header class="event-header" id="event-header">
    <!-- Cover image injected by event.js -->
    <div class="event-header-content">
      <h1 class="event-title" id="event-title">Loading&hellip;</h1>
      <p class="event-date" id="event-date"></p>
    </div>
  </header>

  <!-- ── PHOTO GRID ───────────────────────────────────── -->
  <main class="gallery-main">
    <div class="gallery-grid" id="gallery-grid">
      <!-- Populated by js/event.js -->
    </div>
  </main>

  <!-- ── LIGHTBOX ─────────────────────────────────────── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev"  id="lightbox-prev"  aria-label="Previous photo">&#8249;</button>
    <button class="lightbox-next"  id="lightbox-next"  aria-label="Next photo">&#8250;</button>
    <div class="lightbox-img-wrapper">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <!-- ── FOOTER ───────────────────────────────────────── -->
  <footer class="site-footer">
    <p>&copy; 2025 N.V MEDIA. All rights reserved.</p>
  </footer>

  <script src="js/data.js?v=4"></script>
  <script src="js/event.js?v=4"></script>
  <script src="js/nav.js?v=4"></script>
</body>
</html>
